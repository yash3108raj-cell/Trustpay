    <h2></h2>
  </div>

  <!-- Logo -->
  <div class="logo">

  <!-- Welcome -->
  <h1>Create Account</h1>
  <p class="subtitle">Register to start earning safely</p>

  <!-- Mobile -->
  <div class="input-box">
    <label>Mobile / Username</label>
    <input id="m" type="text" placeholder="Enter your mobile number">
  </div>

  <!-- Password -->
  <div class="input-box">
    <label>Password</label>
    <input id="p" type="password" placeholder="Create password">
  </div>

  <!-- Invite code -->
  <div class="input-box">
    <label>Invite Code (optional)</label>
    <input type="text" id="inviteInput" placeholder="Invite code" readonly>
  </div>

  <!-- Captcha -->
  <div class="captcha-box">
    <span id="q">Loading...</span>
    <input id="a" type="text" placeholder="Captcha answer">
  </div>

  <!-- Button -->
  <button class="login-btn" onclick="register()">Create Account</button>

  <!-- Bottom -->
  <div class="register-box">
    <span>Already have an account?</span>
    <a href="index.html">Login Now</a>
  </div>

</div>

<script>

let cid = "";

document.addEventListener("DOMContentLoaded", () => {

  // Invite Auto Fill
  const params = new URLSearchParams(window.location.search);
  const invite = params.get("invite");

  if (invite) {
    const inviteField = document.getElementById("inviteInput");
    if (inviteField) {
      inviteField.value = invite;
      inviteField.readOnly = true;
    }
  }

  // Captcha Load
  fetch("/captcha")
    .then(r => r.json())
    .then(d => {
      cid = d.id;
      document.getElementById("q").innerText = d.question; // FIX
    });
});

function register() {
  const mobile = document.getElementById("m").value.trim();
  const password = document.getElementById("p").value.trim();
  const ans = document.getElementById("a").value.trim();

  if (!mobile || !password || !ans) { // FIX
    alert("All fields are required");
    return;
  }

  fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      mobile,
      password,
      cid,
      ans
    })
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      alert("Registration successful");
      window.location.href = "index.html";
    } else {
      alert(d.msg || "Registration failed");
    }
  })
  .catch(() => alert("Server error"));
}
   
</script>

</body>
</html>
